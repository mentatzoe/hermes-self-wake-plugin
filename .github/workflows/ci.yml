name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Import smoke (installed package, no PYTHONPATH)
        run: |
          python -c "import self_wake; print(f'self_wake {self_wake.__version__}')"
          python -c "import self_wake.compat_shim, self_wake.capabilities, self_wake.sessions, self_wake.tools; print('submodules importable')"

      - name: Run tests (installed package path)
        run: python -m pytest -q
