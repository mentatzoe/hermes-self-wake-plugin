name: self-wake
version: "1.2.0"
description: Portable operator tools for Hermes internal session wake routing. Bundles a compat shim that provides internal_session_wake_v1 on vanilla Hermes (opt-in).
provides_tools:
  - self_wake_sessions
  - self_wake_subscribe_kanban
  - self_wake_receipts
  - self_wake_doctor
provides_hooks:
  - pre_llm_call
provides_commands:
  - self-wake
provides_skills:
  - kanban-self-wake
metadata:
  hermes:
    requires_capabilities:
      internal_session_wake: ">=1"
    notes: >
      requires_capabilities is advisory only (Hermes has no manifest-level
      capability enforcement). The plugin can self-provide internal_session_wake_v1
      via the bundled compat shim (self_wake.compat_shim_enabled: true) on vanilla
      Hermes, or consume a native/upstream capability when present.
